<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Registration</title>
  <link rel="stylesheet" href="assets/subscribe.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>Subscription Registration</h1>
      <p>Complete your details to generate your QR code.</p>
    </header>

    <main class="card">
      <form id="registerForm">
        <label>
          Full Name
          <input type="text" name="member_name" required />
        </label>

        <label>
          Email Address
          <input type="email" name="email" required />
        </label>

        <label>
          Selected Plan
          <select id="planSelect" name="plan" required>
            <option value="Monthly">Monthly</option>
            <option value="Quarterly">Quarterly</option>
            <option value="Annual">Annual</option>
          </select>
        </label>

        <button type="submit">Register & Generate QR</button>
      </form>

      <div id="result" class="result">
        <p class="placeholder">Your QR code will appear here.</p>
      </div>
    </main>
  </div>

  <script src="assets/register.js"></script>
</body>
</html>
